<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saved Notes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="app-shell">
    <div class="container glass">
      <div class="header">
        <div>
          <h1>📝 Saved Notes</h1>
          <p class="subtitle">Access, filter, update, pin, and export your cloud notes</p>
        </div>
        <button id="themeToggle" class="small-btn secondary-btn">🌙 Dark Mode</button>
      </div>

      <div class="profile-card">
        <div class="profile-left">
          <div class="profile-avatar">👤</div>
          <div>
            <p class="mini-label">Profile</p>
            <h3 id="profileEmail">Not logged in</h3>
            <p id="profileSummary" class="profile-summary">Login to see your note summary</p>
          </div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <p class="stat-label">Total Notes</p>
          <h2 id="totalNotes">0</h2>
        </div>
        <div class="stat-card">
          <p class="stat-label">Pinned Notes</p>
          <h2 id="pinnedNotes">0</h2>
        </div>
        <div class="stat-card">
          <p class="stat-label">Reminders</p>
          <h2 id="reminderCount">0</h2>
        </div>
        <div class="stat-card">
          <p class="stat-label">Latest Update</p>
          <h2 id="latestNoteDate">--</h2>
        </div>
      </div>

      <div class="toolbar section-card">
        <div class="top-actions notes-top-actions">
          <a href="index.html" class="back-link">← Back to Home</a>
          <div class="action-row">
            <button id="exportPdfBtn" class="small-btn primary-btn">📄 Export PDF</button>
            <button id="logoutBtn" class="small-btn danger-btn">Logout</button>
          </div>
        </div>

        <div class="filters-grid">
          <div class="input-group search-group">
            <label for="searchInput">Search Notes</label>
            <input type="text" id="searchInput" placeholder="Search by title or note..." />
          </div>

          <div class="input-group">
            <label for="filterCategory">Filter by Category</label>
            <select id="filterCategory">
              <option value="All">All</option>
              <option value="Personal">Personal</option>
              <option value="Study">Study</option>
              <option value="Work">Work</option>
              <option value="Ideas">Ideas</option>
              <option value="Other">Other</option>
            </select>
          </div>

          <div class="input-group">
            <label for="filterPinned">Pinned Filter</label>
            <select id="filterPinned">
              <option value="All">All</option>
              <option value="Pinned">Pinned Only</option>
              <option value="Unpinned">Unpinned Only</option>
            </select>
          </div>
        </div>
      </div>

      <div id="notesContainer" class="notes-grid"></div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
